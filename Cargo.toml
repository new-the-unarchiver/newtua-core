[package]
name = "newtua-core"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[dependencies]
ar.workspace = true
filetime.workspace = true
thiserror.workspace = true
encoding_rs.workspace = true
chardetng.workspace = true
flate2.workspace = true
bzip2.workspace = true
cab.workspace = true
xz2.workspace = true
zip.workspace = true
zstd.workspace = true
tar.workspace = true
time.workspace = true
sevenz-rust2.workspace = true
unrar.workspace = true
tempfile.workspace = true
cpio.workspace = true
rpm.workspace = true
# XAR (.xar/.pkg): in-house decode-only reader (header + zlib TOC + heap). Uses
# the workspace flate2/bzip2/xz2 plus a tiny XML DOM; no apple-xar, no `ring`.
roxmltree = "0.21"
# MSI is gated behind the `msi` feature (off by default): the current model-B
# handler emits raw CAB-member keys, not resolved install paths. Excluded from
# the shipped build until the dedicated MSI follow-up phase (File/Component/
# Directory table resolution).
msi = { workspace = true, optional = true }
cdfs = "0.2.3"
goblin.workspace = true
warc.workspace = true
lzw-z = { path = "../lzw-z" }

[features]
default = []
# Windows Installer .msi support. Off by default — see the dependency note above.
msi = ["dep:msi"]

[dev-dependencies]
tar.workspace = true
tempfile.workspace = true
zip.workspace = true
msi.workspace = true
cab.workspace = true
flate2.workspace = true
